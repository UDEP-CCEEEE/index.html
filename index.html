<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#003A8F">

<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #F5F7FA;
}

/* CONTENEDOR */
#app {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* HEADER */
#header {
  background: white;
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #eee;
}

#header img {
  width: 140px;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #F5F7FA;
}

/* MENSAJES */
.msg {
  max-width: 75%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 12px;
  font-size: 14px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.bot {
  background: white;
  color: #003A8F;
  border: 1px solid #e0e0e0;
}

.user {
  background: #003A8F;
  color: white;
  margin-left: auto;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
  margin-top: 4px;
}

/* BOTONES */
.btn {
  display: block;
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: none;
  border-radius: 10px;
  background: #003A8F;
  color: white;
  cursor: pointer;
}

.btn:hover {
  background: #0056D2;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #F0F4FA;
}

#input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

button {
  margin-left: 5px;
  background: #003A8F;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
}

/* ESCRIBIENDO */
.typing {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<audio id="sonido">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<div id="app">

<!-- LOGO -->
<div id="header">
  <img src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escribe un mensaje">
  <button onclick="enviar()">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

function sonido() {
  document.getElementById("sonido").play().catch(()=>{});
}

function hora() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ":" +
         d.getMinutes().toString().padStart(2,'0');
}

function bot(msg) {
  sonido();
  const div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function user(msg) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerHTML = msg + `<div class="time">${hora()} ✔✔</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typing() {
  const div = document.createElement("div");
  div.id = "typing";
  div.className = "typing";
  div.innerText = "Escribiendo...";
  chat.appendChild(div);
}

function stopTyping() {
  const t = document.getElementById("typing");
  if(t) t.remove();
}

function btn(text, val) {
  const b = document.createElement("button");
  b.className = "btn";
  b.innerText = text;
  b.onclick = () => send(val);
  chat.appendChild(b);
}

function clearBtns() {
  document.querySelectorAll(".btn").forEach(b=>b.remove());
}

function menu() {
  clearBtns();
  bot("Selecciona una opción:");
  btn("1️⃣ Ventanilla","1");
  btn("2️⃣ Secretaría","2");
  btn("3️⃣ Sala de estudio","3");
  btn("4️⃣ Exámenes","4");
  btn("5️⃣ Anexo","5");
  btn("6️⃣ Fechas","6");
}

function opciones() {
  clearBtns();
  btn("Sí","si");
  btn("No","no");
}

function send(text) {
  user(text);
  responder(text.toLowerCase());
}

function enviar() {
  const i = document.getElementById("input");
  const t = i.value.trim();
  i.value="";
  if(!t) return;
  user(t);
  responder(t.toLowerCase());
}

function responder(t) {
  clearBtns();
  typing();

  setTimeout(()=>{
    stopTyping();

    if(t.includes("hola")){
      bot("Hola 👋 soy el bot de la facultad. ¿En qué puedo ayudarte?");
      menu();
    }

    else if(t==="1"){
      bot("🕒 Ventanilla: 9:00 am - 12:30 pm y 4:00 pm - 6:30 pm.\n¿Otra opción?");
      opciones();
    }

    else if(t==="2"){
      bot("🕒 Secretaría: 10:00 am - 1:00 pm y 4:10 pm - 6:00 pm.\n¿Otra opción?");
      opciones();
    }

    else if(t==="3"){
      bot("🔗 Reserva: safcceee-piura@udep.edu.pe\n¿Otra opción?");
      opciones();
    }

    else if(t==="4"){
      bot("📄 Exámenes:");
      const b=document.createElement("button");
      b.className="btn";
      b.innerText="👉 Abrir enlace";
      b.onclick=()=>window.open("https://udepoffice365ms-my.sharepoint.com/:x:/g/personal/rosamaria_masias_udep_edu_pe/EWihxMsRb25Iuvkhp9RDLj0Bo7taaxBWoC3Zp5dMNehltQ?rtime=SpHsHsNV3Ug","_blank");
      chat.appendChild(b);
      bot("¿Otra opción?");
      opciones();
    }

    else if(t==="5"){
      bot("📞 Anexo: 3113\n¿Otra opción?");
      opciones();
    }

    else if(t==="6"){
      bot("📅 28 abril, 26 mayo, 06 junio.\n¿Otra opción?");
      opciones();
    }

    else if(t==="si"){
      menu();
    }

    else if(t==="no"||t.includes("gracias")){
      bot("¡Muchas gracias, cuídate! 👋");
    }

    else{
      bot("Escribe 'Hola' 😊");
    }

  },700);
}
</script>

</body>
</html>
