<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #F5F7FA;
}

/* CONTENEDOR */
#app {
  max-width: 420px;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
  background: white;
}

/* HEADER */
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 15px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo-left {
  width: 110px;
}

.logo-right {
  width: 60px;
  height: 60px;
  object-fit: contain;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

/* MENSAJES */
.msg {
  max-width: 75%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 10px;
  font-size: 14px;
}

.bot {
  background: #eee;
}

.user {
  background: #003A8F;
  color: white;
  margin-left: auto;
}

/* BOTONES */
.btn {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 8px;
  background: #003A8F;
  color: white;
  cursor: pointer;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #eee;
}

#input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
}

button {
  margin-left: 5px;
  padding: 10px;
  background: #003A8F;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="app">

<div id="header">
  <img class="logo-left" src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
  <img class="logo-right" src="logo-facultad.png">
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escribe un mensaje">
  <button onclick="enviar()">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

function bot(msg){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerText=msg;
  chat.appendChild(div);
}

function user(msg){
  const div=document.createElement("div");
  div.className="msg user";
  div.innerText=msg;
  chat.appendChild(div);
}

function btn(text,val){
  const b=document.createElement("button");
  b.className="btn";
  b.innerText=text;
  b.onclick=()=>responder(val);
  chat.appendChild(b);
}

function limpiar(){
  document.querySelectorAll(".btn").forEach(b=>b.remove());
}

function menu(){
  limpiar();
  bot("Selecciona una opción:");
  btn("1️⃣ Ventanilla","1");
  btn("2️⃣ Secretaría","2");
  btn("3️⃣ Sala","3");
  btn("4️⃣ Exámenes","4");
}

function enviar(){
  const i=document.getElementById("input");
  const t=i.value.trim();
  if(!t) return;
  i.value="";
  user(t);
  responder(t.toLowerCase());
}

function responder(t){
  limpiar();

  if(t.includes("hola")){
    bot("Hola 👋 ¿En qué puedo ayudarte?");
    menu();
  }

  else if(t==="1"){
    bot("Horario ventanilla: 9am - 6:30pm");
  }

  else if(t==="2"){
    bot("Horario secretaría: 10am - 6pm");
  }

  else if(t==="3"){
    bot("Reserva: safcceee-piura@udep.edu.pe");
  }

  else if(t==="4"){
    bot("Abrir enlace:");
    const b=document.createElement("button");
    b.className="btn";
    b.innerText="👉 Abrir";
    b.onclick=()=>window.open("https://udepoffice365ms-my.sharepoint.com/:x:/g/personal/rosamaria_masias_udep_edu_pe/EWihxMsRb25Iuvkhp9RDLj0Bo7taaxBWoC3Zp5dMNehltQ?rtime=SpHsHsNV3Ug","_blank");
    chat.appendChild(b);
  }

  else{
    bot("Escribe 'Hola'");
  }
}
</script>

</body>
</html>
