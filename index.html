<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #F5F7FA;
}

#app {
  max-width: 420px;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
  background: white;
}

/* HEADER */
#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.logo-left {
  width: 100px;
}

.header-text {
  font-weight: 500;
  color: #003A8F;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

/* MENSAJES */
.msg {
  max-width: 75%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 12px;
  font-size: 14px;
  position: relative;
}

.bot {
  background: #eee;
}

.user {
  background: #003A8F;
  color: white;
  margin-left: auto;
}

/* HORA */
.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
  margin-top: 4px;
}

/* BOTONES */
.btn {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  background: #003A8F;
  color: white;
  border: none;
  cursor: pointer;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #eee;
}

#input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #003A8F;
  color: white;
}

/* ESCRIBIENDO */
.typing {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div id="app">

<div id="header">
  <img class="logo-left" src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
  <div class="header-text">FACULTAD DE EMPRESAS</div>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escribe un mensaje">
  <button onclick="enviar()">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

// HORA
function hora(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ":" +
         d.getMinutes().toString().padStart(2,'0');
}

// MENSAJES
function bot(msg){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML = msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function user(msg){
  const div=document.createElement("div");
  div.className="msg user";
  div.innerHTML = msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ESCRIBIENDO
function typing(){
  const div=document.createElement("div");
  div.className="typing";
  div.id="typing";
  div.innerText="Escribiendo...";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function stopTyping(){
  const t=document.getElementById("typing");
  if(t) t.remove();
}

// BOTONES
function btn(text,val){
  const b=document.createElement("button");
  b.className="btn";
  b.innerText=text;
  b.onclick=()=>responder(val);
  chat.appendChild(b);
}

function limpiar(){
  document.querySelectorAll(".btn").forEach(b=>b.remove());
}

// MENÚ
function menu(){
  limpiar();
  bot("Selecciona una opción:");
  btn("1️⃣ Ventanilla","1");
  btn("2️⃣ Secretaría","2");
  btn("3️⃣ Sala","3");
  btn("4️⃣ Exámenes","4");
}

// ENVIAR
function enviar(){
  const i=document.getElementById("input");
  const t=i.value.trim();
  if(!t) return;
  i.value="";
  user(t);
  responder(t.toLowerCase());
}

// ENTER
document.getElementById("input").addEventListener("keypress", function(e){
  if(e.key==="Enter") enviar();
});

// LÓGICA
function responder(t){
  limpiar();
  typing();

  setTimeout(()=>{
    stopTyping();

    if(t.includes("hola")){
      bot("Hola 👋 ¿En qué puedo ayudarte?");
      menu();
    }

    else if(t==="1"){
      bot("🕒 Ventanilla: 9:00 am - 6:30 pm");
      menu();
    }

    else if(t==="2"){
      bot("🕒 Secretaría: 10:00 am - 6:00 pm");
      menu();
    }

    else if(t==="3"){
      bot("🔗 Reserva: safcceee-piura@udep.edu.pe");
      menu();
    }

    else if(t==="4"){
      bot("📄 Exámenes:");

      const b=document.createElement("button");
      b.className="btn";
      b.innerText="👉 Abrir enlace";
      b.onclick=()=>window.open("https://udepoffice365ms-my.sharepoint.com/:x:/g/personal/rosamaria_masias_udep_edu_pe/EWihxMsRb25Iuvkhp9RDLj0Bo7taaxBWoC3Zp5dMNehltQ?rtime=SpHsHsNV3Ug","_blank");
      chat.appendChild(b);

      menu();
    }

    else{
      bot("Escribe 'Hola' 😊");
    }

  },600);
}
</script>

</body>
</html>
