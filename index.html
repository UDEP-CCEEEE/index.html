<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #F5F7FA;
}

#app {
  max-width: 420px;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
  background: white;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.logo-left {
  width: 100px;
}

.header-text {
  color: #003A8F;
  font-weight: 500;
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  max-width: 75%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 12px;
}

.bot {
  background: #eee;
}

.user {
  background: #003A8F;
  color: white;
  margin-left: auto;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}

.btn {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  background: #003A8F;
  color: white;
  border: none;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #eee;
}

#input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border-radius: 8px;
  background: #003A8F;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div id="app">

<div id="header">
  <img class="logo-left" src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
  <div class="header-text">FACULTAD DE EMPRESAS</div>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escribe un mensaje">
  <button onclick="enviar()">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

function hora(){
  const d=new Date();
  return d.getHours()+":"+d.getMinutes().toString().padStart(2,'0');
}

function bot(msg){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function user(msg){
  const div=document.createElement("div");
  div.className="msg user";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function btn(text,val){
  const b=document.createElement("button");
  b.className="btn";
  b.innerText=text;
  b.onclick=()=>responder(val);
  chat.appendChild(b);
}

function limpiar(){
  document.querySelectorAll(".btn").forEach(b=>b.remove());
}

function menu(){
  limpiar();
  bot("Selecciona una opción:");
  btn("1️⃣ Ventanilla","1");
  btn("2️⃣ Secretaría","2");
  btn("3️⃣ Reserva de sala","3");
  btn("4️⃣ Exámenes","4");
}

function opciones(){
  bot("¿Necesitas otra opción?");
  btn("Sí","si");
  btn("No","no");
}

/* 🔥 SOLO ESTO SE MODIFICÓ */
function enviar(){
  const input = document.getElementById("input");
  const texto = input.value.trim();

  if(texto === "") return;

  input.value = "";
  user(texto);
  responder(texto.toLowerCase());
}

/* 🔥 SOLO ESTO SE MODIFICÓ */
document.getElementById("input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    enviar();
  }
});

function responder(t){
  limpiar();

  if(t.includes("hola")){
    bot("Hola 👋 ¿En qué puedo ayudarte?");
    menu();
  }

  else if(t==="1"){
    bot("🕒 Ventanilla: 9:00 am - 6:30 pm");
    opciones();
  }

  else if(t==="2"){
    bot("🕒 Secretaría: 10:00 am - 6:00 pm");
    opciones();
  }

  else if(t==="3"){
  bot(`📚 <b>Reserva de sala:</b><br><br>

Las reservas deben ser solicitadas a través del correo Udep del alumno:<br>
📧 safcceeee-piura@udep.edu.pe<br><br>

<b>Datos requeridos:</b><br>
✓ Asunto: Reserva de Sala de Estudio<br>
✓ Nombre del responsable y P.A.<br>
✓ Integrantes (3 a 6)<br>
✓ Día y hora<br><br>

<b>Recomendaciones:</b><br>
✓ 2 días de anticipación<br>
✓ Respuesta en 1 día<br>
✓ Lunes a viernes: 7am - 9pm<br>
✓ Sábados: 7am - 1pm<br>
✓ Máx. 6 personas<br>
✓ Máx. 4 horas`);

  opciones();
}

  else if(t==="4"){
    bot("📄 Exámenes disponibles:");

    const link=document.createElement("button");
    link.className="btn";
    link.innerText="🔗 Link aquí";
    link.onclick=()=>window.open("https://udepoffice365ms-my.sharepoint.com/:x:/g/personal/rosamaria_masias_udep_edu_pe/EWihxMsRb25Iuvkhp9RDLj0Bo7taaxBWoC3Zp5dMNehltQ?rtime=SpHsHsNV3Ug","_blank");
    chat.appendChild(link);

    opciones();
  }

  else if(t==="si"){
    menu();
  }

  else if(t==="no"){
    bot("¡Muchas gracias, cuídate! 👋");
  }

  else{
    bot("Escribe 'Hola' 😊");
  }
}
</script>

</body>
</html>
