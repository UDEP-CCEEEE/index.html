<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #F5F7FA;
  }

  #app {
    max-width: 420px;
    height: 100vh;
    margin: auto;
    display: flex;
    flex-direction: column;
    background: white;
  }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #ddd;
  }

  .logo-left {
    width: 100px;
  }

  .header-text {
    color: #003A8F;
    font-weight: 500;
  }

  #chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
  }

  .msg {
    max-width: 75%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 12px;
  }

  .bot {
    background: #eee;
  }

  .user {
    background: #003A8F;
    color: white;
    margin-left: auto;
  }

  .time {
    font-size: 10px;
    opacity: 0.6;
    text-align: right;
  }

  .btn {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    margin: 6px 0;
    border-radius: 12px;
    background: #003A8F;
    color: white;
    border: none;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }

  .num {
    width: 28px;
    height: 28px;
    background: white;
    color: #003A8F;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .txt { flex: 1; text-align: left; }

  .icon { font-size: 16px; }

  #inputArea {
    display: flex;
    padding: 10px;
    background: #eee;
  }

  #input {
    flex: 1;
    padding: 14px;
    font-size: 15px;
    border-radius: 10px;
    border: none;
  }

  button.send-btn {
    margin-left: 5px;
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    background: #003A8F;
    color: white;
    border: none;
    cursor: pointer;
  }

  .despedida {
    text-align: center;
    animation: aparecer 0.5s ease;
  }

  .despedida img {
    width: 100px;
    border-radius: 12px;
    animation: bounce 1s ease;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes bounce {
    0% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
    60% { transform: translateY(5px); }
    100% { transform: translateY(0); }
  }
</style>
</head>

<body>

<div id="app">
  <div id="header">
    <img class="logo-left" src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
    <div class="header-text">CC.EE.EE</div>
  </div>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Escribe &quot;Hola&quot; para empezar">
    <button class="send-btn" onclick="enviar()">➤</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");

function hora(){
  const d=new Date();
  return d.getHours()+":"+d.getMinutes().toString().padStart(2,'0');
}

function bot(msg){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function user(msg){
  const div=document.createElement("div");
  div.className="msg user";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function bienvenida(){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML = `
    <div style="text-align:center">
      <img src="mascota.png.jfif" style="width:120px; border-radius:12px; margin-bottom:10px;">
      <br>
      <b>Hola 👋</b><br>
      ¿En qué puedo ayudarte?
    </div>
  `;
  chat.appendChild(div);
  menu();
}

function btn(text,val){
  const b=document.createElement("button");
  b.className="btn";
  const partes = text.split(" ");
  const numero = partes[0];
  const texto = partes.slice(1).join(" ");

  let icono="📌";
  if(val==="1") icono="🕒";
  if(val==="2") icono="🏢";
  if(val==="3") icono="📚";
  if(val==="4") icono="📅";
  if(val==="tramites") icono="🧭";
  if(val==="guias") icono="📂";

  b.innerHTML = `
    <span class="num">${numero}</span>
    <span class="txt">${texto}</span>
    <span class="icon">${icono}</span>
  `;
  b.onclick=()=>responder(val);
  chat.appendChild(b);
}

function limpiar(){
  document.querySelectorAll(".btn").forEach(b=>b.remove());
}

function menu(){
  limpiar();
  bot("Selecciona una opción:");
  btn("1 Horario de atención en ventanilla","1");
  btn("2 Horario de atención en secretaría","2");
  btn("3 Cómo reservar sala de estudio","3");
  btn("4 Publicación de exámenes / Calendario","4");
  btn("5 Información sobre trámites","tramites");
  btn("6 Guías y Documentos PDF","guias");
}

function menuTramites(){
  limpiar();
  bot("¿Sobre qué necesitas ayuda?");
  btn("1 Bachiller / Egresado","egresado");
  btn("2 Certificados / Documentos","docs");
  btn("3 Idiomas","idiomas");
  btn("4 Mesa de ayuda","mesa");
  btn("5 Volver al inicio","si");
}

function menuGuias(){
  limpiar();
  bot("📂 <b>Documentos y Guías PDF:</b><br>Selecciona para abrir el archivo.");
  btn("1 Prácticas Pre Profesionales", "pdf_practicas");
  btn("2 Presentación de CLC", "pdf_clc");
  btn("3 Justificación de Inasistencias", "pdf_inasistencias");
  btn("4 Reprogramación de Exámenes", "pdf_repro");
  btn("5 Hoja de Reclamos", "pdf_reclamos"); // OPCIÓN AGREGADA
  btn("6 Volver al inicio", "si");
}

function opciones(){
  bot("¿Necesitas otra opción?");
  btn("1 Sí","si");
  btn("2 No","no");
}

function enviar(){
  const input=document.getElementById("input");
  const texto=input.value.trim().toLowerCase();
  if(texto==="") return;
  input.value="";
  user(texto);

  // --- MOTOR DE DETECCIÓN DE PALABRAS CLAVE ---

  // Bachiller / Egresado
  if(texto.includes("bachiller") || texto.includes("egresado") || texto.includes("titulo") || texto.includes("título") || texto.includes("diploma") || texto.includes("grado")) {
    responder("egresado");
  } 
  // Certificados y Documentos
  else if(texto.includes("certificado") || texto.includes("constancia") || texto.includes("historial") || texto.includes("carta") || texto.includes("documento")) {
    responder("docs");
  }
  // Reserva de Sala
  else if(texto.includes("reserva") || texto.includes("sala") || texto.includes("estudiar") || texto.includes("cubiculo") || texto.includes("cubículo")) {
    responder("3");
  }
  // Exámenes y Recojo
  else if(texto.includes("examen") || texto.includes("parcial") || texto.includes("final") || texto.includes("recojer") || texto.includes("recoger") || texto.includes("calendario") || texto.includes("rol")) {
    responder("4");
  }
  // Justificación de inasistencias
  else if(texto.includes("falta") || texto.includes("inasistencia") || texto.includes("justificar") || texto.includes("justificacion") || texto.includes("enfermo") || texto.includes("permiso")) {
    responder("pdf_inasistencias");
  }
  // Prácticas Pre Profesionales
  else if(texto.includes("practica") || texto.includes("práctica") || texto.includes("convenio") || texto.includes("ppp")) {
    responder("pdf_practicas");
  }
  // Reclamos
  else if(texto.includes("reclamo") || texto.includes("queja") || texto.includes("reclamar")) {
    responder("pdf_reclamos");
  }
  // Idiomas
  else if(texto.includes("idioma") || texto.includes("ingles") || texto.includes("inglés") || texto.includes("convalidar") || texto.includes("centro de idiomas")) {
    responder("idiomas");
  }
  // Mesa de Ayuda
  else if(texto.includes("ayuda") || texto.includes("mesa") || texto.includes("siga") || texto.includes("contraseña") || texto.includes("correo") || texto.includes("usuario") || texto.includes("bloqueo") || texto.includes("acceso")) {
    responder("mesa");
  }
  // Horarios
  else if(texto.includes("horario") || texto.includes("atencion") || texto.includes("atención") || texto.includes("ventanilla") || texto.includes("secretaria")) {
    bot("Te muestro los horarios de atención:");
    responder("1"); 
  }
  // Saludos
  else if(texto.includes("hola") || texto.includes("buenos dias") || texto.includes("buenas tardes")) {
    responder("hola");
  }
  // Otros casos
  else {
    responder(texto);
  }
}

document.getElementById("input").addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    enviar();
  }
});

window.onload=bienvenida;

function responder(t){
  limpiar();

  if(t.includes("hola")){
    menu();
  }

  else if(t==="1"){
    bot("🕒 Horario de atención en ventanilla: 9:00 am - 12:30 pm y 4:00 pm - 6:00 pm");
    opciones();
  }

  else if(t==="2"){
    bot("🕒 Horario de atención en secretaría: 10:00 am - 12:30 pm y 4:10 pm - 5:30 pm<br>📞 Anexo: 3113");
    opciones();
  }

  else if(t==="3"){
    bot(`📚 <b>Reserva de sala:</b><br><br>
Las reservas deben ser solicitadas a través del correo Udep del alumno:<br>
📧 <b style="color:#003A8F;">safcceeee-piura@udep.edu.pe</b><br><br>
<b>Datos requeridos:</b><br>
✓ Asunto: Reserva de Sala de Estudio<br>
✓ Nombre del responsable y P.A. al que pertenece<br>
✓ Integrantes (mínimo 3 personas y máximo 6)<br>
✓ Día - Hora de inicio y culminación<br><br>
<b>Recomendaciones:</b><br>
✓ Mínimo 2 días hábiles de anticipación<br>
✓ Respuesta en 1 día<br>
✓ Lunes a viernes: 7:00 a.m. - 9:00 p.m.<br>
✓ Sábados: 7:00 a.m. - 1:00 p.m.<br>
✓ Máximo 4 horas por grupo`);
    opciones();
  }

  else if(t==="4"){
    bot("📄 <b>Calendario y Exámenes:</b>");
    const b1=document.createElement("button");
    b1.className="btn";
    b1.innerHTML="🔗 Exámenes disponibles para recoger";
    b1.onclick=()=>window.open("https://udepoffice365ms-my.sharepoint.com/:x:/g/personal/rosamaria_masias_udep_edu_pe/EWihxMsRb25Iuvkhp9RDLj0Bo7taaxBWoC3Zp5dMNehltQ?rtime=SpHsHsNV3Ug","_blank");
    chat.appendChild(b1);

    const b2=document.createElement("button");
    b2.className="btn";
    b2.innerHTML="📅 Calendario Académico PDF";
    b2.onclick=()=>window.open("TU_LINK_CALENDARIO_PDF","_blank");
    chat.appendChild(b2);
    opciones();
  }

  else if(t==="tramites"){ menuTramites(); }
  
  else if(t==="guias"){ menuGuias(); }

  /* CASOS PDF */
  else if(t==="pdf_practicas"){ 
    bot("📑 Abriendo documento de <b>Prácticas Pre Profesionales</b>...");
    window.open("https://udepoffice365ms-my.sharepoint.com/:b:/g/personal/rosamaria_masias_udep_edu_pe/IQBD4NF30h_jTaPWFhqvLyjsAZ7lpxsg5GuGePn30Ixfk2Q", "_blank"); 
    opciones(); 
  }
  
  else if(t==="pdf_inasistencias"){ 
    bot("📑 Abriendo procedimiento de <b>Justificación de Inasistencias</b>...");
    window.open("https://udepoffice365ms-my.sharepoint.com/my?id=%2Fpersonal%2Flazaro%5Fpurizaca%5Fg%5Fudep%5Fedu%5Fpe%2FDocuments%2FProcedimiento%20para%20justificaci%C3%B3n%20de%20inasistencias%202026%2DI%2Epdf&parent=%2Fpersonal%2Flazaro%5Fpurizaca%5Fg%5Fudep%5Fedu%5Fpe%2FDocuments&ga=1", "_blank"); 
    opciones(); 
  }

  else if(t==="pdf_reclamos"){ 
    bot("📑 Abriendo <b>Hoja de Reclamos</b>...");
    window.open("https://udepoffice365ms-my.sharepoint.com/my?viewid=55b51ea1%2D531d%2D426c%2Db2aa%2D297b160a73cf&id=%2Fpersonal%2Flazaro%5Fpurizaca%5Fg%5Fudep%5Fedu%5Fpe%2FDocuments%2FFormato%20de%20reclamo%2Epdf&parent=%2Fpersonal%2Flazaro%5Fpurizaca%5Fg%5Fudep%5Fedu%5Fpe%2FDocuments", "_blank"); 
    opciones(); 
  }
  
  else if(t==="pdf_clc"){ window.open("TU_LINK_CLC", "_blank"); opciones(); }
  else if(t==="pdf_repro"){ window.open("TU_LINK_REPRO", "_blank"); opciones(); }

  else if(t==="egresado"){
    bot(`🎓 <b>Oficina de Atención al Egresado</b><br><br>
👩‍💼 Melissa Coello<br>
📧 <b style="color:#003A8F;">melissa.coello@udep.edu.pe</b><br>
📞 Anexo: 3109<br><br>
✓ Cómo tramitar tu bachiller<br>
✓ Estado de tu diploma o título<br>
✓ Requisitos para sacar mi grado`);
    opciones();
  }

  else if(t==="docs"){
    bot(`📄 <b>Documentos Oficiales</b><br><br>
📧 <b style="color:#003A8F;">documentos.oficiales@udep.edu.pe</b><br>
📞 Anexo: 7060<br><br>
✓ Certificados de estudio universitarios<br>
✓ Constancias o historiales académicos<br>
✓ Carta de presentación`);
    opciones();
  }

  else if(t==="idiomas"){
    bot(`🌐 <b>Centro de Idiomas</b><br><br>
📧 <b style="color:#003A8F;">idiomas@udep.edu.pe</b><br><br>
✓ Exámenes de convalidación<br>
✓ Certificados internacionales<br>
✓ Inscripción a otros idiomas`);
    opciones();
  }

  else if(t==="mesa"){
    bot(`🛠️ <b>Mesa de Ayuda</b><br><br>
📧 <b style="color:#003A8F;">mesadeayuda@udep.edu.pe</b><br><br>
✓ Actualización de datos (cambio de número)<br>
✓ Desbloqueo de correo<br>
✓ Problemas con mi SIGA`);
    opciones();
  }

  else if(t==="no"){
    const div=document.createElement("div");
    div.className="msg bot despedida";
    div.innerHTML = `<img src="mascota.png.jfif"><br><b>¡Muchas gracias, cuídate! 👋</b>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  else if(t==="si"){ menu(); }

  else{
    bot("Escribe 'Hola' 😊");
  }
}
</script>

</body>
</html>
