<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #F5F7FA;
}

#app {
  max-width: 420px;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
  background: white;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.logo-left {
  width: 100px;
}

.header-text {
  color: #003A8F;
  font-weight: 500;
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  max-width: 75%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 12px;
}

.bot {
  background: #eee;
}

.user {
  background: #003A8F;
  color: white;
  margin-left: auto;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}

/* BOTONES PREMIUM */
.btn {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  margin: 6px 0;
  border-radius: 12px;
  background: #003A8F;
  color: white;
  border: none;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.97);
}

.num {
  width: 28px;
  height: 28px;
  background: white;
  color: #003A8F;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.txt {
  flex: 1;
}

.icon {
  font-size: 16px;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #eee;
}

#input {
  flex: 1;
  padding: 14px;
  font-size: 15px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  background: #003A8F;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div id="app">

<div id="header">
  <img class="logo-left" src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
  <div class="header-text">FACULTAD DE EMPRESAS</div>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escribe un mensaje">
  <button onclick="enviar()">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

function hora(){
  const d=new Date();
  return d.getHours()+":"+d.getMinutes().toString().padStart(2,'0');
}

function bot(msg){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function user(msg){
  const div=document.createElement("div");
  div.className="msg user";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function btn(text,val){
  const b=document.createElement("button");
  b.className="btn";

  const partes = text.split(" ");
  const numero = partes[0];
  const texto = partes.slice(1).join(" ");

  let icono = "📌";
  if(val==="1") icono="🕒";
  if(val==="2") icono="🏢";
  if(val==="3") icono="📚";
  if(val==="4") icono="📄";
  if(val==="5") icono="🧭";

  b.innerHTML = `
    <span class="num">${numero}</span>
    <span class="txt">${texto}</span>
    <span class="icon">${icono}</span>
  `;

  b.onclick=()=>responder(val);
  chat.appendChild(b);
}

function limpiar(){
  document.querySelectorAll(".btn").forEach(b=>b.remove());
}

/* MENÚ PRINCIPAL */
function menu(){
  limpiar();
  bot("Selecciona una opción:");
  btn("1 Ventanilla","1");
  btn("2 Secretaría","2");
  btn("3 Reserva de sala","3");
  btn("4 Exámenes","4");
  btn("5 Trámites","tramites");
}

/* SUBMENÚ TRÁMITES */
function menuTramites(){
  limpiar();
  bot("¿Sobre qué necesitas ayuda?");
  btn("1 Bachiller / Egresado","egresado");
  btn("2 Certificados / Documentos","docs");
  btn("3 Idiomas","idiomas");
  btn("4 Mesa de ayuda","mesa");
}

function opciones(){
  bot("¿Necesitas otra opción?");
  btn("1 Sí","si");
  btn("2 No","no");
}

function enviar(){
  const input = document.getElementById("input");
  const texto = input.value.trim();
  if(texto==="") return;
  input.value="";
  user(texto);
  responder(texto.toLowerCase());
}

document.getElementById("input").addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    enviar();
  }
});

/* LÓGICA */
function responder(t){
  limpiar();

  if(t.includes("hola")){
    bot("Hola 👋 ¿En qué puedo ayudarte?");
    menu();
  }

  else if(t==="tramites"){
    menuTramites();
  }

  else if(t==="egresado"){
    bot(`🎓 Oficina de Atención al Egresado<br><br>
👩‍💼 Melissa Coello<br>
📧 melissa.coello@udep.edu.pe<br>
📞 Anexo: 3109<br><br>

✓ Cómo tramitar tu bachiller<br>
✓ Estado de diploma<br>
✓ Requisitos`);

    opciones();
  }

  else if(t==="docs"){
    bot(`📄 Documentos Oficiales<br><br>
📧 documentos.oficiales@udep.edu.pe<br>
📞 Anexo: 7060<br><br>

✓ Certificados<br>
✓ Constancias<br>
✓ Cartas`);

    opciones();
  }

  else if(t==="idiomas"){
    bot(`🌐 Centro de Idiomas<br><br>
📧 idiomas@udep.edu.pe<br><br>

✓ Convalidación de inglés<br>
✓ Certificados<br>
✓ Inscripción`);

    opciones();
  }

  else if(t==="mesa"){
    bot(`🛠️ Mesa de Ayuda<br><br>
📧 mesadeayuda@udep.edu.pe<br><br>

✓ Cambio de datos<br>
✓ Desbloqueo de correo<br>
✓ Acceso SIGA`);

    opciones();
  }

  else if(t==="si"){
    menu();
  }

  else if(t==="no"){
    bot("¡Muchas gracias! 👋");
  }

  else{
    bot("Escribe 'Hola' 😊");
  }
}
</script>

</body>
</html>
