<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #F5F7FA;
}

#app {
  max-width: 420px;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
  background: white;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.logo-left {
  width: 100px;
}

.header-text {
  color: #003A8F;
  font-weight: 500;
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  max-width: 75%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 12px;
}

.bot {
  background: #eee;
}

.user {
  background: #003A8F;
  color: white;
  margin-left: auto;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}

.btn {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  margin: 6px 0;
  border-radius: 12px;
  background: #003A8F;
  color: white;
  border: none;
  display: flex;
  align-items: center;
  gap: 12px;
}

.num {
  width: 28px;
  height: 28px;
  background: white;
  color: #003A8F;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.txt { flex: 1; }

.icon { font-size: 16px; }

#inputArea {
  display: flex;
  padding: 10px;
  background: #eee;
}

#input {
  flex: 1;
  padding: 14px;
  font-size: 15px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  background: #003A8F;
  color: white;
  border: none;
}

/* 🔥 SOLO ESTO SE AGREGÓ */
.despedida {
  text-align: center;
  animation: aparecer 0.5s ease;
}

.despedida img {
  width: 100px;
  border-radius: 12px;
  animation: bounce 1s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes bounce {
  0% { transform: translateY(0); }
  30% { transform: translateY(-10px); }
  60% { transform: translateY(5px); }
  100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div id="app">

<div id="header">
  <img class="logo-left" src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
  <div class="header-text">FACULTAD DE EMPRESAS</div>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escribe un mensaje">
  <button onclick="enviar()">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

function hora(){
  const d=new Date();
  return d.getHours()+":"+d.getMinutes().toString().padStart(2,'0');
}

function bot(msg){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function user(msg){
  const div=document.createElement("div");
  div.className="msg user";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* BIENVENIDA */
function bienvenida(){
  const div=document.createElement("div");
  div.className="msg bot";

  div.innerHTML = `
    <div style="text-align:center">
      <img src="mascota.png.jfif" style="width:120px; border-radius:12px; margin-bottom:10px;">
      <br>
      <b>Hola 👋</b><br>
      ¿En qué puedo ayudarte?
    </div>
  `;

  chat.appendChild(div);
  menu();
}

/* 🔥 SOLO ESTO SE MODIFICÓ */
else if(t==="no"){
  const div=document.createElement("div");
  div.className="msg bot despedida";

  div.innerHTML = `
    <img src="mascota.png.jfif"><br>
    <b>¡Muchas gracias, cuídate! 👋</b>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
