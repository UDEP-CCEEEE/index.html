<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body { margin: 0; font-family: 'Poppins', sans-serif; background: #F5F7FA; }
#app { max-width: 420px; height: 100vh; margin: auto; display: flex; flex-direction: column; background: white; }
#header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; }
.logo-left { width: 100px; }
.header-text { color: #003A8F; font-weight: 500; }
#chat { flex: 1; padding: 10px; overflow-y: auto; }
.msg { max-width: 75%; padding: 10px; margin: 6px 0; border-radius: 12px; }
.bot { background: #eee; }
.user { background: #003A8F; color: white; margin-left: auto; }
.time { font-size: 10px; opacity: 0.6; text-align: right; }
.btn { width: 100%; padding: 14px; font-size: 15px; margin: 6px 0; border-radius: 12px; background: #003A8F; color: white; border: none; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.num { width: 28px; height: 28px; background: white; color: #003A8F; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
.txt { flex: 1; text-align: left; }
.icon { font-size: 16px; }
#inputArea { display: flex; padding: 10px; background: #eee; }
#input { flex: 1; padding: 14px; font-size: 15px; border-radius: 10px; border: none; }
button.send { margin-left: 5px; padding: 14px; font-size: 16px; border-radius: 10px; background: #003A8F; color: white; border: none; cursor: pointer; }

/* ANIMACIÓN */
.despedida { text-align: center; animation: aparecer 0.5s ease; }
.despedida img { width: 100px; border-radius: 12px; animation: bounce 1s ease; }
@keyframes aparecer { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
</style>
</head>

<body>
<div id="app">
  <div id="header">
    <img class="logo-left" src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
    <div class="header-text">CC.EE.EE</div>
  </div>
  <div id="chat"></div>
  <div id="inputArea">
    <input id="input" placeholder="Escribe un mensaje">
    <button class="send" onclick="enviar()">➤</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");

function hora(){
  const d=new Date();
  return d.getHours()+":"+d.getMinutes().toString().padStart(2,'0');
}

function bot(msg){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function user(msg){
  const div=document.createElement("div");
  div.className="msg user";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function bienvenida(){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML = `<div style="text-align:center"><img src="mascota.png.jfif" style="width:120px; border-radius:12px; margin-bottom:10px;"><br><b>Hola 👋</b><br>¿En qué puedo ayudarte?</div>`;
  chat.appendChild(div);
  menu();
}

function btn(text,val){
  const b=document.createElement("button");
  b.className="btn";
  const partes = text.split(" ");
  const numero = partes[0];
  const texto = partes.slice(1).join(" ");

  let icono="📌";
  if(val==="1") icono="🕒";
  if(val==="2") icono="🏢";
  if(val==="3") icono="📚";
  if(val==="4") icono="📅";
  if(val==="tramites") icono="🧭";
  if(val==="guias") icono="📂";

  b.innerHTML = `<span class="num">${numero}</span><span class="txt">${texto}</span><span class="icon">${icono}</span>`;
  b.onclick=()=>responder(val);
  chat.appendChild(b);
}

function limpiar(){
  document.querySelectorAll(".btn").forEach(b=>b.remove());
}

function menu(){
  limpiar();
  bot("Selecciona una opción:");
  btn("1 Horario ventanilla","1");
  btn("2 Horario secretaría","2");
  btn("3 Reserva de sala","3");
  btn("4 Calendario / Exámenes","4");
  btn("5 Trámites","tramites");
  btn("6 Guías y Documentos PDF","guias");
}

function menuTramites(){
  limpiar();
  bot("¿Sobre qué necesitas ayuda?");
  btn("1 Bachiller / Egresado","egresado");
  btn("2 Certificados / Documentos","docs");
  btn("3 Idiomas","idiomas");
  btn("4 Mesa de ayuda","mesa");
}

function menuGuias(){
  limpiar();
  bot("📂 <b>Documentos y Guías PDF:</b>");
  btn("1 Prácticas Pre Profesionales", "pdf_practicas");
  btn("2 Presentación de CLC", "pdf_clc");
  btn("3 Justificación de Inasistencias", "pdf_inasistencias");
  btn("4 Reprogramación de Exámenes", "pdf_repro");
  btn("5 Volver al menú", "si");
}

function opciones(){
  bot("¿Necesitas otra opción?");
  btn("1 Sí","si");
  btn("2 No","no");
}

function enviar(){
  const input=document.getElementById("input");
  const texto=input.value.trim();
  if(texto==="") return;
  input.value="";
  user(texto);
  responder(texto.toLowerCase());
}

document.getElementById("input").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); enviar(); } });

window.onload=bienvenida;

function responder(t){
  limpiar();

  if(t.includes("hola")){ menu(); }
  else if(t==="1"){ bot("🕒 Ventanilla: 9:00 am - 12:30 pm y 4:00 pm - 6:00 pm"); opciones(); }
  else if(t==="2"){ bot("🕒 Secretaría: 10:00 am - 12:30 pm y 4:10 - 5:30"); opciones(); }
  else if(t==="3"){
    bot(`📚 <b>Reserva de sala:</b><br><br>Enviar correo a:<br>📧 <b>safcceeee-piura@udep.edu.pe</b><br>✓ Mínimo 3 personas<br>✓ Máximo 4 horas`);
    opciones();
  }
  else if(t==="4"){
    bot("📄 <b>Calendario y Exámenes:</b>");
    const b1=document.createElement("button"); b1.className="btn"; b1.innerText="🔗 Rol de Exámenes";
    b1.onclick=()=>window.open("https://udepoffice365ms-my.sharepoint.com/:x:/g/personal/rosamaria_masias_udep_edu_pe/EWihxMsRb25Iuvkhp9RDLj0Bo7taaxBWoC3Zp5dMNehltQ?rtime=SpHsHsNV3Ug","_blank");
    chat.appendChild(b1);
    const b2=document.createElement("button"); b2.className="btn"; b2.innerText="📅 Calendario Académico";
    b2.onclick=()=>window.open("TU_LINK_CALENDARIO_PDF","_blank");
    chat.appendChild(b2);
    opciones();
  }
  else if(t==="tramites"){ menuTramites(); }
  else if(t==="guias"){ menuGuias(); }
  
  /* CASOS PDF */
  else if(t==="pdf_practicas"){ window.open("TU_LINK_PRACTICAS_PDF", "_blank"); opciones(); }
  else if(t==="pdf_clc"){ window.open("TU_LINK_CLC_PDF", "_blank"); opciones(); }
  else if(t==="pdf_inasistencias"){ window.open("TU_LINK_INASISTENCIAS_PDF", "_blank"); opciones(); }
  else if(t==="pdf_repro"){ window.open("TU_LINK_REPRO_PDF", "_blank"); opciones(); }

  else if(t==="egresado"){ bot("🎓 <b>Egresados:</b><br>📧 melissa.coello@udep.edu.pe"); opciones(); }
  else if(t==="docs"){ bot("📄 <b>Documentos:</b><br>📧 documentos.oficiales@udep.edu.pe"); opciones(); }
  else if(t==="idiomas"){ bot("🌐 <b>Idiomas:</b><br>📧 idiomas@udep.edu.pe"); opciones(); }
  else if(t==="mesa"){ bot("🛠️ <b>Mesa Ayuda:</b><br>📧 mesadeayuda@udep.edu.pe"); opciones(); }
  
  else if(t==="no"){
    const div=document.createElement("div"); div.className="msg bot despedida";
    div.innerHTML = `<img src="mascota.png.jfif"><br><b>¡Muchas gracias, cuídate! 👋</b>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
  else if(t==="si"){ menu(); }
  else { bot("Escribe 'Hola' 😊"); }
}
</script>
</body>
</html>
