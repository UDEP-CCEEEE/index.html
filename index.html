<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot UDEP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #F5F7FA;
}

#app {
  max-width: 420px;
  height: 100vh;
  margin: auto;
  display: flex;
  flex-direction: column;
  background: white;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.logo-left {
  width: 100px;
}

.header-text {
  color: #003A8F;
  font-weight: 500;
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  max-width: 75%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 12px;
}

.bot {
  background: #eee;
}

.user {
  background: #003A8F;
  color: white;
  margin-left: auto;
}

.time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}

/* 🔥 BOTONES PREMIUM */
.btn {
  width: 100%;
  padding: 14px;
  font-size: 15px;
  margin: 6px 0;
  border-radius: 12px;
  background: #003A8F;
  color: white;
  border: none;

  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;

  transition: all 0.2s ease;
}

/* ✨ HOVER */
.btn:hover {
  background: #0056D2;
}

/* 👆 CLICK */
.btn:active {
  transform: scale(0.97);
}

/* ✅ SELECCIONADO */
.btn.selected {
  background: #002c6b;
}

/* 🔢 NÚMERO */
.num {
  width: 28px;
  height: 28px;
  background: white;
  color: #003A8F;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

/* 🧠 TEXTO */
.txt {
  flex: 1;
}

/* 🎯 ICONO */
.icon {
  font-size: 16px;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #eee;
}

#input {
  flex: 1;
  padding: 14px;
  font-size: 15px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 5px;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  background: #003A8F;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div id="app">

<div id="header">
  <img class="logo-left" src="https://www.udep.edu.pe/direccion-comunicacion/wp-content/uploads/sites/20/2020/11/LogoUDEPazul.png">
  <div class="header-text">FACULTAD DE EMPRESAS</div>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Escribe un mensaje">
  <button onclick="enviar()">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

function hora(){
  const d=new Date();
  return d.getHours()+":"+d.getMinutes().toString().padStart(2,'0');
}

function bot(msg){
  const div=document.createElement("div");
  div.className="msg bot";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function user(msg){
  const div=document.createElement("div");
  div.className="msg user";
  div.innerHTML=msg + `<div class="time">${hora()}</div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* 🔥 BOTONES CON ICONOS + ANIMACIÓN */
function btn(text,val){
  const b=document.createElement("button");
  b.className="btn";

  const partes = text.split(" ");
  const numero = partes[0];
  const texto = partes.slice(1).join(" ");

  // ICONOS
  let icono = "📌";
  if(val==="1") icono = "🕒";
  if(val==="2") icono = "🏢";
  if(val==="3") icono = "📚";
  if(val==="4") icono = "📄";

  b.innerHTML = `
    <span class="num">${numero}</span>
    <span class="txt">${texto}</span>
    <span class="icon">${icono}</span>
  `;

  b.onclick=()=>{
    document.querySelectorAll(".btn").forEach(btn=>btn.classList.remove("selected"));
    b.classList.add("selected");
    responder(val);
  };

  chat.appendChild(b);
}

function limpiar(){
  document.querySelectorAll(".btn").forEach(b=>b.remove());
}

function menu(){
  limpiar();
  bot("Selecciona una opción:");
  btn("1 Ventanilla","1");
  btn("2 Secretaría","2");
  btn("3 Reserva de sala","3");
  btn("4 Exámenes","4");
}

function opciones(){
  bot("¿Necesitas otra opción?");
  btn("1 Sí","si");
  btn("2 No","no");
}

function enviar(){
  const input = document.getElementById("input");
  const texto = input.value.trim();

  if(texto === "") return;

  input.value = "";
  user(texto);
  responder(texto.toLowerCase());
}

document.getElementById("input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    enviar();
  }
});

function responder(t){
  limpiar();

  if(t.includes("hola")){
    bot("Hola 👋 ¿En qué puedo ayudarte?");
    menu();
  }

  else if(t==="1"){
    bot("🕒 Ventanilla: 9:00 am - 6:30 pm");
    opciones();
  }

  else if(t==="2"){
    bot("🕒 Secretaría: 10:00 am - 6:00 pm");
    opciones();
  }

  else if(t==="3"){
    bot(`📚 <b>Reserva de sala:</b><br><br>
...`);
    opciones();
  }

  else if(t==="4"){
    bot("📄 Exámenes disponibles:");

    const link=document.createElement("button");
    link.className="btn";
    link.innerText="🔗 Link aquí";
    link.onclick=()=>window.open("https://udepoffice365ms-my.sharepoint.com/...","_blank");
    chat.appendChild(link);

    opciones();
  }

  else if(t==="si"){
    menu();
  }

  else if(t==="no"){
    bot("¡Muchas gracias, cuídate! 👋");
  }

  else{
    bot("Escribe 'Hola' 😊");
  }
}
</script>

</body>
</html>
